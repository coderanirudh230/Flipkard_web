<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
     <link rel="stylesheet" href="../style/Wishlist.css">
</head>
<body>
    <div>
        <h2>Wishlist</h2>
        <div>
            <img src="../image/lap2.jpg" alt="">
            <div>
                <h3>Product Name</h3>
                <p class="prices">$999</p>
                <p class="rating"><i class="fa-regular fa-star"></i>4.5</p>
            </div>
            <div class="button">
                <button class="add-cart"><i><i class="fa-solid fa-cart-arrow-down"></i></i>Add to cart</button>
                <button class="remove"><i class="fa-solid fa-xmark"></i>Remove</button>
            </div>
        </div>
    </div>
</body>
</html>
