<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History</title>
    <link rel="stylesheet" href="../style/order.css">
</head>
<body>
    <div>
        <h2>Order History</h2>
        <table>
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Product</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Order-Date</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>#12345</td>
                    <td><img src="../image/head.jpg" alt="Product Image"></td>
                    <td>Headphone</td>
                    <td>$999</td>
                    <td class="deliverd">Delivered</td>
                    <td>10 Apr 2026</td>
                </tr>
                <tr>
                    <td>#98745</td>
                    <td><img src="../image/smart.jpg" alt="Product Image"></td>
                    <td>Smart Watch</td>
                    <td>$400</td>
                    <td class="pending">Pending</td>
                    <td>15 Apr 2026</td>
                </tr>
                <tr>
                    <td>#7894</td>
                    <td><img src="../image/tab.jpg" alt="Product Image"></td>
                    <td>Tablet</td>
                    <td>$800</td>
                    <td class="cancelled">Cancelled</td>
                    <td>15 march 2026</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
