<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
    <link rel="stylesheet" href="../style/Mycart.css">
</head>
<body>
    <div>
        <h2>Your Shopping Cart</h2>
        <div class="cart-item">
        <p class="item-name">Product 1</p>
        <p class="item-price">$500</p>

        <div class="Quantity">
           <button>-</button>
           <span class="qut">1</span>
           <button>+</button>
        </div>

        <p class="total">$500</p>
        </div>
        <h3 id="grand-total">Total:- $1000</h3>
        <button class="checkout">checkout</button>

    </div>
</body>
</html>
