<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
     <link rel="stylesheet" href="../style/product.css">
</head>
<body>
    <!-- left-side image  -->
    <div class="container">
        <div class="product-image">
            <img src="../image/lap2.jpg" class="main-img" id="mainImage" >

            <div class="gallery">
             <img src="../image/images.jpg" alt="">
             <img src="../image/images (1).jpg" >
             <img src="../image/images (2).jpg" >
             <img src="../image/images (3).jpg" >
            </div>
        </div>
        <!-- right-product details -->
        <div class="product-details">
    <h2 class="title">Dell Laptop</h2>
    <h3 class="price">$1200</h3>

    <div class="rate">
        ⭐ 4.2/5 | 12,535 Reviews
    </div>

    <p class="details">
        This is a great laptop with excellent performance and design. 
        Also has long battery life and sleek build.
    </p>

    <div class="button">
        <button class="cart-btn"><i class="fa-solid fa-cart-shopping"></i> Add to Cart</button>
        <button class="buy-btn"><i class="fa-solid fa-bolt"></i> Buy Now</button>
    </div>
</div>
</body>
</html>
