<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style/filter.css">
</head>
<body>
    
    <!-- Product-Listing page -->
    <div class="product-list">
        <!-- slidebar- filter -->
        <div class="sideBar">
            <h3>Filters</h3>

            <h3>Price</h3>
            <input type="range" min="100" max="5000">

            <h3>Brand</h3>
            <label><input type="checkbox">Apple</label>
            <label><input type="checkbox">Nyka</label>
            <label><input type="checkbox">Camron</label>
            <label><input type="checkbox">Samsung</label>
            <!-- rating -->

            <h4>Rating</h4>
            <label><input type="radio" name="ratting">4* & Above</label><br>
            <label><input type="radio" name="ratting">3* & Above</label>
        </div>

        <!-- main content -->
        <div class="main">

            <!-- sorting -->
             <div class="sorting">
             <select id="sort">
                <option>Sort By</option>
                <option value="low">Prices Low to High</option>
                <option value="high">Prices High to Low</option>
                <option value="popular">Popularity</option>
             </select>
       </div>
            <!-- product cart -->
            <div class="product" id="product-list">
                <div class="cart" data-price="1200" data-rating="4">
                    <img src="../image/lap2.jpg">
                    <h4>Laptop</h4>
                    <p>$1400</p>
                    <p>4.5</p>
                    <button type="button">Add to Cart</button>
                </div>
                <div class="cart" data-price="1200" data-rating="4">
                    <img src="../image/phone.jpg">
                    <h4>Mobile Phone</h4>
                    <p>$800</p>
                    <p>4.5</p>
                    <button type="button">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
